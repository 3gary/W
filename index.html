<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المستشار المالي الذكي</title>
  <style>
    body {
      background-color: #020617;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    #bankApp {
      max-width: 900px;
      margin: 20px auto;
      padding: 15px;
      direction: rtl;
      color: #fff;
      box-sizing: border-box;
    }

    #bankApp * {
      box-sizing: border-box;
    }

    .card {
      background: #0f172a;
      border: 1px solid #1f2937;
      padding: 15px;
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: #fff;
      text-align: center;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    .run {
      background: #2563eb;
      color: #fff;
      transition: background 0.2s;
    }

    .run:hover {
      background: #1d4ed8;
    }

    .box {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #1f2937;
    }

    .alert {
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
    }

    .good { background: #16a34a; }
    .mid { background: #f59e0b; color: #000; }
    .bad { background: #dc2626; }

    .hint {
      font-size: 12px;
      color: #cbd5e1;
      margin-top: 8px;
      line-height: 1.7;
    }

    /* الشريط */
    .meter {
      width: 100%;
      height: 14px;
      background: #1f2937;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    #meterBar {
      height: 100%;
      width: 0%;
      transition: 1.8s ease-in-out;
      border-radius: 20px;
    }

    /* توصية السعر */
    .recBox {
      margin-bottom: 12px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: linear-gradient(135deg, #0f172a, #111827);
      text-align: center;
      animation: fadeIn .6s ease-in-out;
    }

    .recBox b {
      display: block;
      font-size: 20px;
      color: #22c55e;
      margin-top: 6px;
    }

    .recTitle {
      color: #93c5fd;
      font-weight: bold;
    }

    .recSub {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div id="bankApp">

  <div class="card">
    <input id="loan" placeholder="مبلغ العقار" />
    <input id="down" placeholder="الدفعة + الدعم السكني" />
    <input id="salary" placeholder="الراتب الشهري" />
    <input id="expenses" placeholder="الالتزامات" />
    <input id="months" placeholder="مدة التمويل بالأشهر" />
    <input id="rate" placeholder="نسبة الفائدة (5.5 أو 5,5)" />

    <button class="run" onclick="calc()">
      تحليل القرض
    </button>
    
    <button class="run" onclick="shareInputs()">
  مشاركة النتائج
</button>
    
  </div>
  

  <div class="card">
    <div class="meter">
      <div id="meterBar"></div>
    </div>

    <div class="box">
      <span>التمويل</span>
      <b id="financed">0</b>
    </div>

    <div class="box">
      <span>القسط</span>
      <b id="monthly">0</b>
    </div>

    <div class="box">
      <span>الفائدة</span>
      <b id="interest">0</b>
    </div>

    <div class="box">
      <span>الإجمالي</span>
      <b id="total">0</b>
    </div>

    <div class="box">
      <span>المتبقي من الراتب</span>
      <b id="remaining">0</b>
    </div>

    <div class="box">
      <span>نسبة الاستقطاع</span>
      <b id="percent">0%</b>
    </div>

    <div class="box">
      <span>نهاية القسط (هجري)</span>
      <b id="endDate">--</b>
    </div>

    <div id="alertBox" class="alert">
      أدخل البيانات لبدء التحليل
    </div>

    <div id="hintBox" class="hint"></div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);

  function parseMoney(v){
    return parseFloat(String(v).replace(/,/g,'')) || 0;
  }

  function parseRate(v){
    return parseFloat(String(v).replace(',', '.')) || 0;
  }

  function fmt(v){
    return Math.round(v).toLocaleString('en-US');
  }

  /* فواصل مالية */
  function bindMoney(id){
    const el=$(id);
    el.addEventListener('input',()=>{
      let v=el.value.replace(/[^0-9]/g,'');
      v=v.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      el.value=v;
    });
  }

  /* الفائدة */
  function bindRate(id){
    const el=$(id);
    el.addEventListener('input',()=>{
      let v=el.value.replace(/[^0-9.,]/g,'');
      v=v.replace(',', '.');
      let p=v.split('.');
      if(p.length>2){
        v=p[0]+'.'+p.slice(1).join('');
      }
      el.value=v;
    });
  }

  ['loan','down','salary','expenses','months'].forEach(bindMoney);
  bindRate('rate');

  function calc(){
    const L=parseMoney(loan.value);
    const D=parseMoney(down.value);
    const S=parseMoney(salary.value);
    const E=parseMoney(expenses.value);
    const M=parseMoney(months.value);
    const R=parseRate(rate.value)/100;

    const financed=L-D;
    const interest=financed*R*(M/12);
    const total=financed+interest;
    const monthly=total/M;
    const totalDebt=monthly+E;
    const percent=(totalDebt/S)*100;
    const remaining=S-totalDebt;

    financedEl.textContent=fmt(financed);
    monthlyEl.textContent=fmt(monthly);
    interestEl.textContent=fmt(interest);
    totalEl.textContent=fmt(total);
    remainingEl.textContent=fmt(remaining);
    percentEl.textContent=fmt(percent)+'%';

    /* تاريخ هجري */
    if(M > 0){
      const end = new Date();
      end.setMonth(end.getMonth() + M);
      const formatter = new Intl.DateTimeFormat('en-u-ca-islamic', {
        year:'numeric',
        month:'2-digit',
        day:'2-digit'
      });
      const parts = formatter.formatToParts(end);
      let d='',m='',y='';
      parts.forEach(p=>{
        if(p.type==='day') d=p.value;
        if(p.type==='month') m=p.value;
        if(p.type==='year') y=p.value;
      });
      endDate.textContent=`${y}/${m}/${d}`;
    }else{
      endDate.textContent='--';
    }

    /* تقييم */
    let score=100-percent;
    if(remaining<0) score-=30;
    if(percent>50) score-=30;
    if(percent>70) score-=40;
    if(score>100) score=100;
    if(score<0) score=0;

    setTimeout(()=>{
      meterBar.style.width=score+"%";
    },200);

    let warnings="";
    let alerts="";
    let guide="";
    let recommendedPrice="";

    if(score>=70){
      meterBar.style.background="#16a34a";
      alertBox.className="alert good";
      alertBox.textContent="🟢 مناسب";
      warnings="✔ الالتزامات ضمن الحد الآمن ✔ القسط لا يضغط ✔ يوجد هامش مالي";
      alerts="⚠ تغير الفائدة قد يؤثر مستقبلاً";
      guide="✔ يمكنك الموافقة بأمان";
    }
    else if(score>=40){
      meterBar.style.background="#f59e0b";
      alertBox.className="alert mid";
      alertBox.textContent="🟡 يحتاج حذر";
      warnings="⚠ ضغط متوسط على الدخل ⚠ التزامات مرتفعة";
      alerts="⚠ أي زيادة ستسبب ضغط";
      guide="🟡 يفضل التأجيل أو التقليل";
    }
    else{
      meterBar.style.background="#dc2626";
      alertBox.className="alert bad";
      alertBox.textContent="🔴 خطر مالي";
      warnings="🚨 ضغط عالي جداً 🚨 لا يوجد هامش آمن";
      alerts="⚠ خطر تعثر مالي";
      guide="🔴 غير مناسب حالياً";
    }

    /* سعر مناسب */
    if(score < 70 && S > 0){
      const targetPercent=30;
      const maxDebt=(S*targetPercent)/100;
      const allowedMonthly=maxDebt-E;
      if(allowedMonthly>0){
        const allowedTotal=allowedMonthly*M;
        const factor=1+(R*(M/12));
        const price=(allowedTotal/factor)+D;
        recommendedPrice=`
          <div class="recBox">
            <div class="recTitle">🏡 سعر عقار مناسب لك</div>
            <b>${fmt(price)}</b>
            <div class="recSub">🟢 عند هذا السعر يصبح التقييم آمن (أخضر)</div>
          </div>
        `;
      }
    }

    hintBox.innerHTML=`
      ${recommendedPrice}
      📌 التحذيرات: ${warnings}<br>
      ⚠ التنبيهات: ${alerts}<br>
      🧠 الإرشاد: ${guide}
    `;
  }

  /* عناصر */
  const financedEl=$('financed');
  const monthlyEl=$('monthly');
  const interestEl=$('interest');
  const totalEl=$('total');
  const remainingEl=$('remaining');
  const percentEl=$('percent');
  const endDate=$('endDate');
  const alertBox=$('alertBox');
  const hintBox=$('hintBox');
  const meterBar=$('meterBar');



async function shareInputs() {
  const data = `
🏡 بيانات التمويل العقاري

💰 مبلغ العقار: ${loan.value}
📉 الدفعة + الدعم السكني: ${down.value}
💵 الراتب الشهري: ${salary.value}
📌 الالتزامات: ${expenses.value}
📆 مدة التمويل: ${months.value} شهر
📊 نسبة الفائدة: ${rate.value}%

------------------------
📍 تم الإرسال من المستشار المالي الذكي
  `.trim();

  try {
    if (navigator.share) {
      await navigator.share({
        title: 'بيانات التمويل العقاري',
        text: data
      });
    } else {
      await navigator.clipboard.writeText(data);
      alert('تم نسخ البيانات، جهازك لا يدعم المشاركة المباشرة');
    }
  } catch (err) {
    console.log('فشل المشاركة', err);
  }
}

</script>


</body>
</html>
